name: Check and Test

on:
  pull_request:
  push:
    branches:
      - master

env:
  MOONBIT_INSTALL_VERSION: "0.10.3+16975d007"

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install-unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install-windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: |
          moon check --target all

      - name: moon build
        run: |
          moon build --target all

      - name: moon test
        run: |
          moon test --target all

      # The demo's worker driver is exercised by the differential harness on the
      # difftest branch, not by the unit tests, so it drags the total down here.
      - name: coverage must be 100%
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          moon test --enable-coverage
          echo "--- line coverage ---"
          moon coverage analyze | tee analyze.txt
          grep -q "All source files are fully covered" analyze.txt \
            || { echo "::error::line coverage is below 100%"; exit 1; }
          echo "--- branch coverage ---"
          moon coverage report -f summary | tee summary.txt
          line="$(grep -oE 'Total: [0-9]+/[0-9]+' summary.txt | tail -n1)"
          covered="$(echo "$line" | grep -oE '[0-9]+' | head -n1)"
          total="$(echo "$line" | grep -oE '[0-9]+' | tail -n1)"
          echo "branch points: covered=$covered total=$total"
          if [ -z "$total" ] || [ "$covered" != "$total" ]; then
            echo "::error::branch coverage is below 100% ($line)"; exit 1
          fi

      - name: runnable example
        run: |
          moon run cmd/example

      - name: lint
        run: |
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code
