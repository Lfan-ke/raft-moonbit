name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: moon check

      - name: Run tests
        run: moon test

      - name: Interface is up to date
        run: |
          moon info
          git diff --exit-code

      - name: Code is formatted
        run: |
          moon fmt
          git diff --exit-code
