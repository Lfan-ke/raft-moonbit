name: Build and publish docs site

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MOONBIT_INSTALL_VERSION: "0.10.3+16975d007"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install moonbit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: version
        run: moon version --all

      # --- build: everything that produces artefacts lands in ./_site ---------
      - name: build wasm demo artifact
        run: moon build --target wasm --release

      - name: generate API reference from the .mbti interface
        run: node docs/gen-api.mjs

      - name: assemble site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r docs/. _site/
          # ship the freshly built wasm, not whatever was committed
          cp _build/wasm/release/build/raft-moonbit.wasm _site/raft-moonbit.wasm
          # the generator source and dev screenshots are not part of the site
          rm -f _site/gen-api.mjs
          touch _site/.nojekyll
          echo "assembled _site:" && ls -la _site

      # --- publish: only pushes the prebuilt ./_site to the gh-pages branch ---
      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
